<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Run the curated SNP panel without uploading genotype data."/>
    <meta http-equiv="refresh" content="0; url=analyze.html"/>
    <link rel="canonical" href="https://otcan.github.io/metabo-brief/analyze.html"/>
    <title>MetaboBrief SNP Analyzer</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #111827;
            --muted: #475569;
            --line: #d7e0ea;
            --panel: #ffffff;
            --page: #f4f7fb;
            --accent: #0f766e;
            --action: #152033;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: var(--page);
            color: var(--ink);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(720px, calc(100% - 2rem));
            padding: 2rem;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.08);
        }

        .brand {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 2rem;
            font-weight: 800;
        }

        .brand img {
            width: 36px;
            height: 36px;
        }

        .kicker {
            margin: 0 0 0.5rem;
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.1rem, 7vw, 4rem);
            line-height: 0.98;
            letter-spacing: 0;
        }

        p {
            max-width: 58ch;
            margin: 1rem 0 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        a {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1rem;
            border-radius: 7px;
            font-weight: 800;
            text-decoration: none;
        }

        .primary {
            background: var(--action);
            color: #ffffff;
        }

        .secondary {
            border: 1px solid var(--line);
            color: var(--ink);
        }
    </style>
    <script>
        window.location.replace("analyze.html");
    </script>
</head>
<body>
<main>
    <div class="brand">
        <img src="assets/logo/logo.svg" alt="" width="36" height="36"/>
        <span>MetaboBrief</span>
    </div>
    <p class="kicker">Local SNP analysis</p>
    <h1>Run the curated SNP panel without uploading genotype data.</h1>
    <p>
        The main MetaboBrief demo is the browser-only SNP analyzer. If you are not redirected automatically,
        open the analyzer below.
    </p>
    <div class="actions">
        <a class="primary" href="analyze.html">Open SNP Analyzer</a>
        <a class="secondary" href="https://github.com/otcan/metabo-brief">GitHub</a>
    </div>
</main>
</body>
</html>
